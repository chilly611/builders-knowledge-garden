<!DOCTYPE html>
<html lang="en">
<head>

  <title>Builder's Knowledge Garden — Killer App Command Center</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
    #root { width:100%; height:100%; }

    /* ── BRAND TOKENS ── */
    :root {
      --ink: #1B3A5C;
      --ink-light: #5A7A9A;
      --ink-muted: #8FA4B8;
      --accent: #2B6CB0;
      --accent-light: #4A90D9;
      --bg-sky: #FAFCFF;
      --bg-cream: #FDF8F0;
      --bg-card: #FFFFFF;
      --bg-hover: #F0F6FF;
      --bg-selected: #E8F1FD;
      --border: #D4DEE8;
      --border-subtle: #E8EFF5;
      --green: #1D9E75;
      --yellow: #D4A017;
      --red: #DC3545;
      --gold: #C4A44A;
      --purple: #7F77DD;
      --orange: #E07C3A;
      --brown: #8B5E3C;
      --shadow: 0 2px 12px rgba(27,58,92,0.06);
      --shadow-md: 0 4px 20px rgba(27,58,92,0.08);
      --shadow-lg: 0 8px 32px rgba(27,58,92,0.10);
      --shadow-glow: 0 0 20px rgba(43,108,176,0.15);
    }

    /* ── HOMEPAGE ── */
    .homepage {
      min-height:100vh; background: var(--bg-cream);
      position:relative; overflow:hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .homepage::before {
      content:''; position:absolute; inset:0;
      background-image:
        linear-gradient(0deg, rgba(43,108,176,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(43,108,176,0.04) 1px, transparent 1px);
      background-size:40px 40px; pointer-events:none;
    }
    .hp-content { position:relative; z-index:1; text-align:center; max-width:800px; padding:40px; }
    .hp-badge {
      display:inline-flex; align-items:center; gap:8px; padding:8px 20px;
      background:var(--bg-card); border:1px solid var(--border); border-radius:999px;
      font-size:12px; font-weight:600; color:var(--ink-light); letter-spacing:1px;
      text-transform:uppercase; margin-bottom:32px; box-shadow:var(--shadow);
    }
    .hp-badge-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
    .hp-title {
      font-size:56px; font-weight:800; color:var(--ink); letter-spacing:-1.5px;
      line-height:1.1; margin-bottom:16px;
    }
    .hp-title-accent { color:var(--accent); }
    .hp-subtitle {
      font-size:18px; color:var(--ink-light); line-height:1.6; margin-bottom:48px;
      max-width:600px; margin-left:auto; margin-right:auto;
    }
    .hp-cta {
      display:inline-flex; align-items:center; gap:10px;
      padding:18px 40px; background:var(--accent); color:white; border:none;
      border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
      font-family:'Inter',sans-serif; letter-spacing:0.3px;
      transition:all 0.25s ease; box-shadow:var(--shadow-md), var(--shadow-glow);
    }
    .hp-cta:hover { background:#245BA4; transform:translateY(-2px); box-shadow:var(--shadow-lg), 0 0 30px rgba(43,108,176,0.25); }
    .hp-cta-arrow { font-size:20px; transition:transform 0.2s; }
    .hp-cta:hover .hp-cta-arrow { transform:translateX(4px); }
    .hp-stats {
      display:flex; gap:40px; justify-content:center; margin-top:48px;
      font-family:'IBM Plex Mono',monospace;
    }
    .hp-stat { text-align:center; }
    .hp-stat-num { font-size:28px; font-weight:600; color:var(--ink); }
    .hp-stat-label { font-size:11px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }

    /* Floating tool silhouettes */
    .tool-float { position:absolute; opacity:0.07; pointer-events:none; z-index:0; }
    .tool-float svg { width:100%; height:100%; }

    /* ── COMMAND CENTER ── */
    .cc { display:flex; flex-direction:column; width:100%; height:100vh; background:var(--bg-sky); overflow:hidden; }

    /* Header */
    .cc-hdr {
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:16px 28px; border-bottom:1px solid var(--border);
      background:var(--bg-card); flex-shrink:0;
    }
    .cc-hdr-left { display:flex; align-items:center; gap:12px; }
    .cc-logo { font-size:20px; font-weight:800; color:var(--accent); letter-spacing:-0.5px; }
    .cc-logo-pipe { color:var(--border); margin:0 4px; font-weight:300; }
    .cc-logo-sub { font-size:14px; font-weight:500; color:var(--ink); }
    .cc-hdr-right { display:flex; align-items:center; gap:20px; }
    .cc-trade-pill {
      display:flex; align-items:center; gap:6px; padding:6px 14px;
      background:var(--bg-hover); border:1px solid var(--border-subtle);
      border-radius:8px; font-size:12px; color:var(--ink); font-weight:500;
    }
    .cc-xp-wrap { display:flex; flex-direction:column; gap:3px; min-width:140px; }
    .cc-xp-top { display:flex; justify-content:space-between; font-size:10px; color:var(--ink-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
    .cc-xp-bar { height:6px; background:var(--border-subtle); border-radius:3px; overflow:hidden; }
    .cc-xp-fill { height:100%; border-radius:3px; background:linear-gradient(90deg, var(--accent), var(--accent-light)); transition:width 0.5s ease; }
    .cc-rank {
      display:flex; align-items:center; gap:6px; padding:6px 14px;
      background:rgba(43,108,176,0.08); border:1px solid rgba(43,108,176,0.15);
      border-radius:8px; font-size:13px; font-weight:600; color:var(--accent);
    }

    /* Level Journey Map */
    .level-map {
      display:flex; align-items:center; justify-content:center; gap:0;
      padding:20px 28px; border-bottom:1px solid var(--border-subtle);
      background:var(--bg-card); flex-shrink:0; overflow-x:auto;
    }
    .lm-node {
      display:flex; flex-direction:column; align-items:center; gap:6px;
      cursor:pointer; padding:8px 12px; border-radius:12px;
      transition:all 0.2s ease; min-width:90px; position:relative;
    }
    .lm-node:hover { background:var(--bg-hover); }
    .lm-node.active { background:var(--bg-selected); }
    .lm-icon {
      width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:20px; border:2px solid var(--border); background:var(--bg-card);
      transition:all 0.25s ease; box-shadow:var(--shadow);
    }
    .lm-node.active .lm-icon { border-color:var(--accent); box-shadow:var(--shadow-glow); transform:scale(1.1); }
    .lm-node.done .lm-icon { border-color:var(--green); background:rgba(29,158,117,0.08); }
    .lm-node.partial .lm-icon { border-color:var(--yellow); background:rgba(212,160,23,0.08); }
    .lm-name { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink-muted); transition:color 0.2s; }
    .lm-node.active .lm-name { color:var(--accent); }
    .lm-node.done .lm-name { color:var(--green); }
    .lm-phase { font-size:9px; color:var(--ink-muted); font-weight:400; }
    .lm-connector { width:28px; height:2px; background:var(--border-subtle); flex-shrink:0; margin-bottom:24px; }
    .lm-connector.done { background:var(--green); }
    .lm-progress-ring {
      position:absolute; top:-2px; right:-2px; width:16px; height:16px;
      border-radius:50%; font-size:8px; font-weight:700; color:white;
      display:flex; align-items:center; justify-content:center;
    }

    /* Main content area: quest list + detail panel */
    .cc-body { display:flex; flex:1; overflow:hidden; }

    /* Quest list (left column) */
    .quest-col {
      width:340px; border-right:1px solid var(--border-subtle);
      overflow-y:auto; background:var(--bg-card); flex-shrink:0;
      display:flex; flex-direction:column;
    }
    .quest-col::-webkit-scrollbar { width:4px; }
    .quest-col::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .qc-header {
      padding:16px 20px; border-bottom:1px solid var(--border-subtle);
      display:flex; align-items:center; justify-content:space-between;
    }
    .qc-title { font-size:13px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:0.8px; }
    .qc-count { font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-muted); }
    .quest-item {
      display:flex; align-items:center; gap:12px; padding:14px 20px;
      border-bottom:1px solid var(--border-subtle); cursor:pointer;
      transition:all 0.15s ease; border-left:4px solid transparent;
    }
    .quest-item:hover { background:var(--bg-hover); }
    .quest-item.active { background:var(--bg-selected); border-left-color:var(--accent); }
    .quest-item.status-complete { border-left-color:var(--green); }
    .quest-item.status-in-progress { border-left-color:var(--yellow); }
    .quest-item.status-not-started { border-left-color:var(--red); opacity:0.85; }
    .qi-status {
      width:20px; height:20px; border-radius:50%; border:2px solid; display:flex;
      align-items:center; justify-content:center; font-size:10px; flex-shrink:0;
    }
    .qi-status.s-complete { border-color:var(--green); background:var(--green); color:white; }
    .qi-status.s-in-progress { border-color:var(--yellow); background:rgba(212,160,23,0.15); color:var(--yellow); }
    .qi-status.s-not-started { border-color:var(--border); background:transparent; color:transparent; }
    .qi-body { flex:1; min-width:0; }
    .qi-name { font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .qi-tag {
      display:inline-block; font-size:9px; padding:2px 6px; margin-top:3px;
      background:rgba(43,108,176,0.08); color:var(--accent); border-radius:3px;
      font-weight:600; text-transform:uppercase; letter-spacing:0.3px;
    }
    .qi-xp { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); font-weight:600; flex-shrink:0; }

    /* Detail panel (right / main area) */
    .detail-panel { flex:1; overflow-y:auto; padding:32px; background:var(--bg-sky); }
    .detail-panel::-webkit-scrollbar { width:6px; }
    .detail-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    /* Detail: empty state */
    .dp-empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100%; color:var(--ink-muted); text-align:center; gap:16px;
    }
    .dp-empty-icon { font-size:48px; opacity:0.3; }
    .dp-empty-text { font-size:15px; font-weight:500; }
    .dp-empty-hint { font-size:12px; color:var(--ink-muted); }

    /* Detail: quest view */
    .dp-quest { animation:fadeIn 0.25s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .dp-breadcrumb { font-size:11px; color:var(--ink-muted); margin-bottom:8px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
    .dp-breadcrumb span { color:var(--accent); }
    .dp-title { font-size:24px; font-weight:700; color:var(--ink); margin-bottom:8px; letter-spacing:-0.5px; }
    .dp-desc { font-size:14px; color:var(--ink-light); line-height:1.6; margin-bottom:24px; max-width:640px; }
    .dp-meta {
      display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px;
    }
    .dp-meta-pill {
      display:flex; align-items:center; gap:6px; padding:6px 12px;
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:8px; font-size:11px; font-weight:600; color:var(--ink-light);
    }
    .dp-meta-dot { width:8px; height:8px; border-radius:50%; }

    /* Detail: action cards (the interactive content) */
    .dp-section { margin-bottom:28px; }
    .dp-section-title {
      font-size:12px; font-weight:700; color:var(--ink); text-transform:uppercase;
      letter-spacing:0.8px; margin-bottom:12px; padding-bottom:8px;
      border-bottom:1px solid var(--border-subtle);
    }
    .dp-checklist { display:flex; flex-direction:column; gap:8px; }
    .dp-check-item {
      display:flex; align-items:center; gap:10px; padding:12px 16px;
      background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:8px; cursor:pointer; transition:all 0.15s ease;
    }
    .dp-check-item:hover { border-color:var(--accent); background:var(--bg-hover); }
    .dp-check-item.checked { border-color:var(--green); background:rgba(29,158,117,0.04); }
    .dp-checkbox {
      width:18px; height:18px; border-radius:4px; border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      font-size:11px; transition:all 0.15s ease;
    }
    .dp-check-item.checked .dp-checkbox { background:var(--green); border-color:var(--green); color:white; }
    .dp-check-label { font-size:13px; color:var(--ink); font-weight:500; flex:1; }
    .dp-check-item.checked .dp-check-label { text-decoration:line-through; color:var(--ink-muted); }

    /* Template cards */
    .dp-templates { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; }
    .dp-template-card {
      padding:16px; background:var(--bg-card); border:1px solid var(--border-subtle);
      border-radius:10px; cursor:pointer; transition:all 0.2s ease;
    }
    .dp-template-card:hover { border-color:var(--accent); box-shadow:var(--shadow); transform:translateY(-2px); }
    .dp-template-card.selected { border-color:var(--accent); background:var(--bg-selected); box-shadow:var(--shadow-glow); }
    .dp-tpl-icon { font-size:24px; margin-bottom:8px; }
    .dp-tpl-name { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:4px; }
    .dp-tpl-desc { font-size:11px; color:var(--ink-muted); line-height:1.4; }

    /* Status actions */
    .dp-actions { display:flex; gap:10px; margin-top:24px; flex-wrap:wrap; }
    .dp-btn {
      padding:10px 20px; border-radius:8px; font-size:13px; font-weight:600;
      font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s ease; border:none;
    }
    .dp-btn-primary { background:var(--accent); color:white; }
    .dp-btn-primary:hover { background:#245BA4; transform:translateY(-1px); }
    .dp-btn-secondary { background:var(--bg-card); color:var(--ink); border:1px solid var(--border); }
    .dp-btn-secondary:hover { background:var(--bg-hover); }
    .dp-btn-success { background:var(--green); color:white; }
    .dp-btn-success:hover { background:#178A65; }

    /* Progress indicator */
    .dp-progress-wrap { margin-top:20px; }
    .dp-progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--ink-muted); font-weight:600; margin-bottom:6px; }
    .dp-progress-bar { height:8px; background:var(--border-subtle); border-radius:4px; overflow:hidden; }
    .dp-progress-fill { height:100%; border-radius:4px; transition:width 0.4s ease; }
    .dp-progress-fill.green { background:linear-gradient(90deg, var(--green), #2FBD9A); }
    .dp-progress-fill.yellow { background:linear-gradient(90deg, var(--yellow), #F5C750); }
    .dp-progress-fill.red { background:linear-gradient(90deg, var(--red), #E8616E); }

    /* Responsive */
    @media (max-width:900px) {
      .quest-col { width:100%; border-right:none; border-bottom:1px solid var(--border-subtle); max-height:40vh; }
      .cc-body { flex-direction:column; }
      .hp-title { font-size:36px; }
      .hp-stats { gap:24px; }
      .hp-stat-num { font-size:20px; }
      .level-map { padding:12px; gap:0; }
      .lm-node { min-width:60px; padding:6px 4px; }
      .lm-icon { width:36px; height:36px; font-size:16px; }
      .lm-connector { width:12px; }
    }
  </style>
</head>

          detail: { type:'checklist', title:'Services Scheduling', items:['Request utility locates (811)','Schedule dumpster delivery/pickup','Book portable toilet','Schedule building inspections per phase','Arrange fuel delivery for equipment'] }
        },
        { id:13, name:'Hiring Lane', desc:'Link to external hiring services filtered by trade and location. TaskRabbit for day labor, industry boards for licensed trades, with AI-drafted outreach messages.', tag:'RAG Search', xp:60, s:'not-started',
          detail: { type:'checklist', title:'Hiring Checklist', items:['Define role requirements (trade, duration, skill)','Search external hiring platforms','Review top 3 candidates','Send outreach messages','Confirm hire + schedule start date'] }
        },
      ]},
      { id:4, name:'BUILD', phase:'Execution', icon:'\u{1F528}', color:'var(--yellow)', quests:[
        { id:14, name:'Weather-Aware Scheduling', desc:'AI monitors weather forecasts and proactively suggests schedule adjustments. Rain on Thursday? Move framing to Friday. Save crew idle time and reschedule chaos.', tag:'Agentic', xp:85, s:'not-started',
          detail: { type:'checklist', title:'Weather Protocol', items:['Connect weather API for job site location','Flag outdoor phases sensitive to weather','Set reschedule threshold (rain %, temp extremes)','Review weekly forecast every Monday','Approve/override AI reschedule suggestions'] }
        },
        { id:15, name:'Voice-to-Daily-Log', desc:'Foreman speaks into phone at end of shift. AI transcribes, extracts action items and risk flags, auto-generates a searchable daily log entry.', tag:'Speech AI', xp:80, s:'not-started',
          detail: { type:'checklist', title:'Daily Log Setup', items:['Enable voice recording on mobile','Set daily log reminder (end of shift)','Review AI transcription for accuracy','Tag action items and risk flags','Archive searchable log entry'] }
        },
        { id:16, name:'OSHA Toolbox Talks', desc:'For each phase, AI generates a short safety briefing tailored to the specific risks. 3-minute script the foreman reads to crew each morning.', tag:'LLM Reasoning', xp:75, s:'not-started',
          detail: { type:'checklist', title:'Safety Briefing', items:['Generate talk for today\u2019s phase/hazards','Review site-specific risks (not just generic)','Deliver talk to crew (3 minutes)','Log attendance','Note any near-misses or concerns'] }
        },
        { id:17, name:'Expense-to-Budget Tracking', desc:'Upload receipt photos. AI extracts line items, categorizes to the estimate\u2019s CSI breakdown, tracks spend-to-date, and alerts when any category approaches budget.', tag:'Vision AI', xp:90, s:'in-progress',
          detail: { type:'checklist', title:'Budget Tracking', items:['Upload receipts (photo or PDF)','Review AI categorization','Fix any misclassified items','Check spend vs. estimate dashboard','Address overage alerts'] }
        },
        { id:18, name:'Contacts + AI Outreach', desc:'Save contacts for subs, suppliers, equipment rental. AI can reach out on your behalf to check pricing, availability, or negotiate terms.', tag:'Agentic', xp:85, s:'not-started',
          detail: { type:'checklist', title:'Contact Management', items:['Import existing contacts','Tag by type (sub, supplier, rental, service)','Add past rate/pricing notes','Draft RFQ template for AI outreach','Review AI-collected quotes'] }
        },
        { id:19, name:'Compass Navigation', desc:'Save your current context \u2014 any page, any tool state, any mid-task progress \u2014 into a project record. Resume exactly where you left off.', tag:'State Mgmt', xp:70, s:'not-started',
          detail: { type:'checklist', title:'Project Bookmarks', items:['Save current estimate state','Save schedule state','Save open task context','Add voice/text note to bookmark','Test resume from saved state'] }
        },
      ]},
      { id:5, name:'ADAPT', phase:'Change Mgmt', icon:'\u{1F504}', color:'var(--orange)', quests:[
        { id:20, name:'Change-Order Generation', desc:'Client changes their mind? Soil conditions require a different foundation? AI generates a formal change order with new scope, cost delta, timeline impact, and approval workflow. What takes 2 hours takes 4 minutes.', tag:'LLM Reasoning', xp:120, s:'not-started',
          detail: { type:'checklist', title:'Change Order Process', items:['Document scope change (text or voice)','AI generates cost delta estimate','AI calculates schedule impact','Generate formal CO document','Send to client for approval','Update master scope + schedule on approval'] }
        },
      ]},
      { id:6, name:'COLLECT', phase:'Close-Out', icon:'\u{1F4B0}', color:'var(--purple)', quests:[
        { id:21, name:'Draw-Request Auto-Fill', desc:'AI auto-fills draw forms with contract amount, % complete by phase, holdback, and payment owed. Tracks lender responses and alerts on approvals.', tag:'Agentic', xp:100, s:'not-started',
          detail: { type:'checklist', title:'Draw Processing', items:['Calculate % complete per phase','Auto-fill draw request form','Verify holdback calculation','Submit to lender','Track response + approval status'] }
        },
        { id:22, name:'Lien-Waiver Tracking', desc:'Track which subs and suppliers have signed lien waivers. When a payment is requested, AI checks waiver status and blocks payment if missing.', tag:'Document AI', xp:95, s:'not-started',
          detail: { type:'checklist', title:'Waiver Tracking', items:['List all subs/suppliers requiring waivers','Send conditional waivers with progress payments','Collect signed waivers before releasing payment','Send unconditional waivers at final payment','Archive all signed waivers'] }
        },
        { id:23, name:'Payroll Classification', desc:'AI analyzes worker relationships and suggests 1099 vs. W-2 classification. Flags risky misclassifications that could trigger IRS liability.', tag:'LLM Reasoning', xp:80, s:'not-started',
          detail: { type:'checklist', title:'Classification Review', items:['List all workers + current classification','Run AI classification analysis','Review flagged misclassifications','Consult CPA on edge cases','Update records and file forms'] }
        },
        { id:24, name:'Photo-to-Punch-List', desc:'Walk the site with your phone. AI analyzes photos for defects or code violations and auto-generates a punch list with severity, trade assignment, and photo tags.', tag:'Vision AI', xp:100, s:'not-started',
          detail: { type:'checklist', title:'Punch List Process', items:['Take site photos (all rooms/areas)','Upload to AI for defect detection','Review AI-generated punch items','Assign items to trades','Track completion + re-inspect'] }
        },
      ]},
      { id:7, name:'REFLECT', phase:'Post-Project', icon:'\u{1F4D6}', color:'var(--brown)', quests:[
        { id:25, name:'Retainage Chase Agent', desc:'AI tracks final-payment due dates, sends automated reminders per contract terms, and escalates to collection if overdue. Never leave money on the table.', tag:'Agentic', xp:110, s:'not-started',
          detail: { type:'checklist', title:'Retainage Recovery', items:['Log retainage amount + release terms','Set reminder at 30/60/90 days','Send automated reminder emails','Escalate to attorney if 120+ days','Confirm final payment received'] }
        },
        { id:26, name:'Warranty Reminders', desc:'Track warranty periods for workmanship and materials. Get alerts before expiration, schedule service visits, document everything.', tag:'Agentic', xp:85, s:'not-started',
          detail: { type:'checklist', title:'Warranty Management', items:['Log warranty periods per component','Set reminders at 80% of warranty term','Schedule pre-expiration inspection','Document inspection with photos','Close warranty file on expiration'] }
        },
        { id:27, name:'Lessons Learned', desc:'Capture what worked and what didn\u2019t. "Framing went faster with 4 workers instead of 3." "Never use Supplier X again." AI makes these searchable and surfaces them during future planning.', tag:'RAG Search', xp:100, s:'not-started',
          detail: { type:'checklist', title:'Post-Mortem', items:['Log what went well','Log what went wrong','Note cost vs. estimate variance','Record team feedback','Tag lessons by trade/phase for future retrieval'] }
        },
      ]},
    ];

    const RANK = (xp) => {
      if (xp < 500) return { label:'Apprentice', emoji:'\u{1F528}', next:500 };
      if (xp < 2000) return { label:'Journeyman', emoji:'\u26A1', next:2000 };
      if (xp < 5000) return { label:'Craftsman', emoji:'\u{1F6E0}\uFE0F', next:5000 };
      if (xp < 15000) return { label:'Master', emoji:'\u{1F3D7}\uFE0F', next:15000 };
      return { label:'Architect', emoji:'\u{1F3DB}\uFE0F', next:15000 };
    };

    /* ════════════════════════════════════════════
       HOMEPAGE
       ════════════════════════════════════════════ */
    function Homepage({ onEnter }) {
      return (
        <div className="homepage">
          {/* Floating tool silhouettes */}
          <svg className="tool-float" style={{top:'8%',left:'6%',width:80,height:80}} viewBox="0 0 80 80"><path d="M40 10L50 35H65L53 50L58 75L40 60L22 75L27 50L15 35H30Z" fill="currentColor" stroke="none" opacity="0.5"/></svg>
          <svg className="tool-float" style={{top:'15%',right:'10%',width:100,height:60,transform:'rotate(15deg)'}} viewBox="0 0 100 60"><rect x="5" y="25" width="90" height="10" rx="2" fill="currentColor"/><rect x="20" y="10" width="20" height="40" rx="3" fill="currentColor"/><circle cx="30" cy="30" r="8" fill="none" stroke="currentColor" strokeWidth="2"/></svg>
          <svg className="tool-float" style={{bottom:'20%',left:'8%',width:70,height:90}} viewBox="0 0 70 90"><rect x="30" y="0" width="10" height="60" rx="2" fill="currentColor"/><rect x="15" y="55" width="40" height="20" rx="4" fill="currentColor"/></svg>
          <svg className="tool-float" style={{bottom:'12%',right:'7%',width:90,height:90,transform:'rotate(-10deg)'}} viewBox="0 0 90 90"><circle cx="45" cy="45" r="30" fill="none" stroke="currentColor" strokeWidth="4"/><circle cx="45" cy="45" r="8" fill="currentColor"/><line x1="45" y1="15" x2="45" y2="75" stroke="currentColor" strokeWidth="2"/></svg>
          <svg className="tool-float" style={{top:'50%',left:'3%',width:120,height:40}} viewBox="0 0 120 40"><rect x="0" y="15" width="80" height="10" rx="2" fill="currentColor"/><polygon points="80,10 120,20 80,30" fill="currentColor"/></svg>
          <svg className="tool-float" style={{top:'30%',right:'4%',width:60,height:100}} viewBox="0 0 60 100"><line x1="30" y1="0" x2="10" y2="80" stroke="currentColor" strokeWidth="3"/><line x1="30" y1="0" x2="50" y2="80" stroke="currentColor" strokeWidth="3"/><circle cx="30" cy="5" r="5" fill="currentColor"/></svg>

          <div className="hp-content">
            <div className="hp-badge"><div className="hp-badge-dot" /> Builder's Knowledge Garden</div>
            <h1 className="hp-title">
              Killer App<br/><span className="hp-title-accent">Command Center</span>
            </h1>
            <p className="hp-subtitle">
              27 AI-powered capabilities organized as a game. Seven levels that mirror how a job actually unfolds — from scouting the bid to banking the lesson.
            </p>
            <button className="hp-cta" onClick={onEnter}>
              Enter Command Center <span className="hp-cta-arrow">{'\u2192'}</span>
            </button>
            <div className="hp-stats">
              <div className="hp-stat"><div className="hp-stat-num">27</div><div className="hp-stat-label">AI Capabilities</div></div>
              <div className="hp-stat"><div className="hp-stat-num">7</div><div className="hp-stat-label">Job Phases</div></div>
              <div className="hp-stat"><div className="hp-stat-num">10\u00D7</div><div className="hp-stat-label">Force Multiplier</div></div>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       COMMAND CENTER
       ════════════════════════════════════════════ */
    function CommandCenter() {
      const [activeLevel, setActiveLevel] = useState(1);
      const [activeQuest, setActiveQuest] = useState(null);
      const [questStates, setQuestStates] = useState({});
      const [checkStates, setCheckStates] = useState({});
      const [selectedTemplates, setSelectedTemplates] = useState({});
      const [xp, setXp] = useState(0);

      useEffect(() => {
        const init = {};
        let initXP = 0;
        LEVELS.forEach(l => l.quests.forEach(q => {
          init[q.id] = q.s;
          if (q.s === 'complete') initXP += q.xp;
          if (q.s === 'in-progress') initXP += Math.round(q.xp * 0.3);
        }));
        setQuestStates(init);
        setXp(initXP);
      }, []);

      const currentLevel = LEVELS.find(l => l.id === activeLevel);
      const currentQuest = activeQuest ? LEVELS.flatMap(l => l.quests).find(q => q.id === activeQuest) : null;
      const rank = RANK(xp);
      const pct = Math.min(100, (xp / rank.next) * 100);

      const toggleCheck = useCallback((questId, idx) => {
        const key = `${questId}-${idx}`;
        setCheckStates(p => {
          const next = { ...p, [key]: !p[key] };
          // Calculate quest completion
          const quest = LEVELS.flatMap(l => l.quests).find(q => q.id === questId);
          if (quest && quest.detail && quest.detail.items) {
            const total = quest.detail.items.length;
            let done = 0;
            for (let i = 0; i < total; i++) {
              if (next[`${questId}-${i}`]) done++;
            }
            const ratio = done / total;
            setQuestStates(prev => {
              const oldS = prev[questId];
              let newS = ratio === 0 ? 'not-started' : ratio < 1 ? 'in-progress' : 'complete';
              // XP adjustment
              if (newS === 'complete' && oldS !== 'complete') setXp(x => x + quest.xp);
              if (oldS === 'complete' && newS !== 'complete') setXp(x => Math.max(0, x - quest.xp));
              if (newS === 'in-progress' && oldS === 'not-started') setXp(x => x + Math.round(quest.xp * 0.3));
              if (newS === 'not-started' && oldS === 'in-progress') setXp(x => Math.max(0, x - Math.round(quest.xp * 0.3)));
              return { ...prev, [questId]: newS };
            });
          }
          return next;
        });
      }, []);

      const toggleTemplate = useCallback((questId, tplIdx) => {
        const key = `${questId}-${tplIdx}`;
        setSelectedTemplates(p => ({ ...p, [key]: !p[key] }));
      }, []);

      const getLevelStatus = useCallback((level) => {
        const states = level.quests.map(q => questStates[q.id] || q.s);
        if (states.every(s => s === 'complete')) return 'done';
        if (states.some(s => s === 'complete' || s === 'in-progress')) return 'partial';
        return 'todo';
      }, [questStates]);

      const getQuestProgress = useCallback((quest) => {
        if (!quest.detail || !quest.detail.items) return 0;
        let done = 0;
        quest.detail.items.forEach((_, i) => { if (checkStates[`${quest.id}-${i}`]) done++; });
        return Math.round((done / quest.detail.items.length) * 100);
      }, [checkStates]);

      const statusDot = (s) => s === 'complete' ? '\u2713' : s === 'in-progress' ? '\u2022' : '';

      return (
        <div className="cc">
          {/* Header */}
          <header className="cc-hdr">
            <div className="cc-hdr-left">
              <span className="cc-logo">BKG</span>
              <span className="cc-logo-pipe">|</span>
              <span className="cc-logo-sub">Killer App Command Center</span>
            </div>
            <div className="cc-hdr-right">
              <div className="cc-xp-wrap">
                <div className="cc-xp-top"><span>{rank.label} {rank.emoji}</span><span>{xp} / {rank.next} XP</span></div>
                <div className="cc-xp-bar"><div className="cc-xp-fill" style={{width:pct+'%'}} /></div>
              </div>
            </div>
          </header>

          {/* Level Journey Map */}
          <nav className="level-map">
            {LEVELS.map((level, i) => {
              const status = getLevelStatus(level);
              const isActive = level.id === activeLevel;
              return (
                <React.Fragment key={level.id}>
                  {i > 0 && <div className={`lm-connector ${status === 'done' ? 'done' : ''}`} />}
                  <div className={`lm-node ${isActive ? 'active' : ''} ${status}`} onClick={() => { setActiveLevel(level.id); setActiveQuest(null); }}>
                    <div className="lm-icon">{level.icon}</div>
                    <div className="lm-name">{level.name}</div>
                    <div className="lm-phase">{level.phase}</div>
                  </div>
                </React.Fragment>
              );
            })}
          </nav>

          {/* Body: quest list + detail */}
          <div className="cc-body">
            {/* Quest List Column */}
            <div className="quest-col">
              <div className="qc-header">
                <div className="qc-title">L{activeLevel} {'\u00B7'} {currentLevel ? currentLevel.name : ''}</div>
                <div className="qc-count">{currentLevel ? currentLevel.quests.length : 0} quests</div>
              </div>
              {currentLevel && currentLevel.quests.map(q => {
                const s = questStates[q.id] || q.s;
                const isActive = activeQuest === q.id;
                return (
                  <div key={q.id}
                    className={`quest-item status-${s} ${isActive ? 'active' : ''}`}
                    onClick={() => setActiveQuest(q.id)}
                  >
                    <div className={`qi-status s-${s}`}>{statusDot(s)}</div>
                    <div className="qi-body">
                      <div className="qi-name">{q.name}</div>
                      <div className="qi-tag">{q.tag}</div>
                    </div>
                    <div className="qi-xp">+{q.xp}</div>
                  </div>
                );
              })}
            </div>

            {/* Detail Panel */}
            <div className="detail-panel">
              {!currentQuest ? (
                <div className="dp-empty">
                  <div className="dp-empty-icon">{currentLevel ? currentLevel.icon : '\u{1F9ED}'}</div>
                  <div className="dp-empty-text">Select a quest to get started</div>
                  <div className="dp-empty-hint">Click any capability on the left to see details, checklists, and interactive tools</div>
                </div>
              ) : (
                <div className="dp-quest" key={currentQuest.id}>
                  <div className="dp-breadcrumb">{currentLevel.name} <span>{'\u203A'}</span> {currentQuest.name}</div>
                  <h2 className="dp-title">{currentQuest.name}</h2>
                  <p className="dp-desc">{currentQuest.desc}</p>
                  <div className="dp-meta">
                    <div className="dp-meta-pill">
                      <div className="dp-meta-dot" style={{background: (questStates[currentQuest.id]||currentQuest.s)==='complete' ? 'var(--green)' : (questStates[currentQuest.id]||currentQuest.s)==='in-progress' ? 'var(--yellow)' : 'var(--red)'}} />
                      {(questStates[currentQuest.id]||currentQuest.s)==='complete' ? 'Complete' : (questStates[currentQuest.id]||currentQuest.s)==='in-progress' ? 'In Progress' : 'Not Started'}
                    </div>
                    <div className="dp-meta-pill">{currentQuest.tag}</div>
                    <div className="dp-meta-pill" style={{color:'var(--gold)', fontWeight:700}}>+{currentQuest.xp} XP</div>
                  </div>

                  {/* Interactive content based on detail type */}
                  {currentQuest.detail && currentQuest.detail.type === 'checklist' && (
                    <div className="dp-section">
                      <div className="dp-section-title">{currentQuest.detail.title}</div>
                      <div className="dp-checklist">
                        {currentQuest.detail.items.map((item, i) => {
                          const checked = !!checkStates[`${currentQuest.id}-${i}`];
                          return (
                            <div key={i} className={`dp-check-item ${checked ? 'checked' : ''}`}
                              onClick={() => toggleCheck(currentQuest.id, i)}>
                              <div className="dp-checkbox">{checked ? '\u2713' : ''}</div>
                              <div className="dp-check-label">{item}</div>
                            </div>
                          );
                        })}
                      </div>
                      <div className="dp-progress-wrap">
                        <div className="dp-progress-label">
                          <span>Progress</span>
                          <span>{getQuestProgress(currentQuest)}%</span>
                        </div>
                        <div className="dp-progress-bar">
                          <div className={`dp-progress-fill ${getQuestProgress(currentQuest) === 100 ? 'green' : getQuestProgress(currentQuest) > 0 ? 'yellow' : 'red'}`}
                            style={{width: getQuestProgress(currentQuest)+'%'}} />
                        </div>
                      </div>
                    </div>
                  )}

                  {currentQuest.detail && currentQuest.detail.type === 'templates' && (
                    <div className="dp-section">
                      <div className="dp-section-title">{currentQuest.detail.title}</div>
                      <div className="dp-templates">
                        {currentQuest.detail.templates.map((tpl, i) => {
                          const sel = !!selectedTemplates[`${currentQuest.id}-${i}`];
                          return (
                            <div key={i} className={`dp-template-card ${sel ? 'selected' : ''}`}
                              onClick={() => toggleTemplate(currentQuest.id, i)}>
                              <div className="dp-tpl-icon">{tpl.icon}</div>
                              <div className="dp-tpl-name">{tpl.name}</div>
                              <div className="dp-tpl-desc">{tpl.desc}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {currentQuest.detail && currentQuest.detail.type === 'form' && (
                    <div className="dp-section">
                      <div className="dp-section-title">{currentQuest.detail.title}</div>
                      <div className="dp-checklist">
                        {currentQuest.detail.fields.map((field, i) => (
                          <div key={i} className="dp-check-item" style={{cursor:'default'}}>
                            <div style={{width:18,height:18,borderRadius:4,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:10,fontWeight:700,flexShrink:0}}>{i+1}</div>
                            <div className="dp-check-label" style={{textDecoration:'none',color:'var(--ink)'}}>{field}</div>
                          </div>
                        ))}
                      </div>
                      <div className="dp-actions">
                        <button className="dp-btn dp-btn-primary">Generate Estimate</button>
                        <button className="dp-btn dp-btn-secondary">Save for Later</button>
                      </div>
                    </div>
                  )}

                  <div className="dp-actions" style={{marginTop:32}}>
                    {(questStates[currentQuest.id]||currentQuest.s) !== 'complete' && (
                      <button className="dp-btn dp-btn-success" onClick={() => {
                        const oldS = questStates[currentQuest.id] || currentQuest.s;
                        if (oldS !== 'complete') {
                          if (oldS === 'not-started') setXp(x => x + currentQuest.xp);
                          if (oldS === 'in-progress') setXp(x => x + currentQuest.xp - Math.round(currentQuest.xp * 0.3));
                          setQuestStates(p => ({...p, [currentQuest.id]: 'complete'}));
                          // Check all items
                          if (currentQuest.detail && currentQuest.detail.items) {
                            const newChecks = {};
                            currentQuest.detail.items.forEach((_, i) => { newChecks[`${currentQuest.id}-${i}`] = true; });
                            setCheckStates(p => ({...p, ...newChecks}));
                          }
                        }
                      }}>Mark Complete</button>
                    )}
                    {(questStates[currentQuest.id]||currentQuest.s) === 'complete' && (
                      <button className="dp-btn dp-btn-secondary" onClick={() => {
                        setXp(x => Math.max(0, x - currentQuest.xp));
                        setQuestStates(p => ({...p, [currentQuest.id]: 'not-started'}));
                        if (currentQuest.detail && currentQuest.detail.items) {
                          const newChecks = {};
                          currentQuest.detail.items.forEach((_, i) => { newChecks[`${currentQuest.id}-${i}`] = false; });
                          setCheckStates(p => ({...p, ...newChecks}));
                        }
                      }}>Reset Quest</button>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       APP ROOT
       ════════════════════════════════════════════ */
    function App() {
      const [scene, setScene] = useState('homepage');
      if (scene === 'homepage') return <Homepage onEnter={() => setScene('cc')} />;
      return <CommandCenter />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
