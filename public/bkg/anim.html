<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030308}
#c{position:absolute;inset:0;width:100%;height:100%;display:block}
#mv{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:0;transition:opacity 2.8s ease-in;
  --poster-color:transparent;
  background:transparent;
}
#cap{position:fixed;bottom:52px;left:0;right:0;text-align:center;pointer-events:none;z-index:10}
#capMain{font-family:monospace;font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.45);text-transform:uppercase;transition:color 1.2s,opacity .8s}
#capSub{font-family:monospace;font-size:9px;letter-spacing:.12em;color:rgba(29,158,117,.7);margin-top:8px;min-height:14px}
#skip{position:fixed;top:20px;right:20px;padding:6px 14px;background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);border-radius:20px;font-size:10px;letter-spacing:.1em;font-family:monospace;cursor:pointer;z-index:10}
</style>
</head>
<body>
<canvas id="c"></canvas>
<model-viewer
  id="mv"
  src="/bkg/b_logo_3D.glb"
  environment-image="neutral"
  exposure="1.4"
  shadow-intensity="0.6"
  camera-orbit="-30deg 75deg 5m"
  camera-target="0m 0m 0m"
  disable-zoom
  disable-pan
  disable-tap
  interaction-prompt="none"
  loading="eager"
  reveal="manual"
></model-viewer>
<div id="cap"><div id="capMain">EVERY GREAT BUILDING</div><div id="capSub"></div></div>
<button id="skip">SKIP &rarr;</button>
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const NT=6000,NV=4000,NTOT=NT+NV,SC=2.1;
const PHASE_T=[0,5,10.5,15.5,22];
const VC=[[.16,.26,.55],[.58,.22,.07],[.44,.44,.50],[.20,.16,.13],[.10,.48,.40],[.36,.16,.07]];

function lerpN(a,b,t){return a+(b-a)*t}
function easeOut(t){return 1-Math.pow(1-t,4)}
function easeInOut(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1}
function clamp(v,a,b){return Math.min(b,Math.max(a,v))}

function toolColor(x,y,nx){
  const fb=Math.max(0,y*.5+.6);let r,g,b;
  if(y>.55){r=.18+fb*.12;g=.28+fb*.1;b=.60+fb*.14;}
  else if(x<-.28){const t=Math.sin(y*5+2)*.5+.5;r=.52+t*.22;g=.22+t*.1;b=.05;}
  else if(x>.10&&y>.06){const t=(Math.sin(y*14)+1)*.5;r=.42+t*.38;g=.42+t*.38;b=.46+t*.38;}
  else if(x>.10&&y<-.06){r=.26+fb*.1;g=.20+fb*.07;b=.16+fb*.05;}
  else{r=.28+fb*.14;g=.28+fb*.14;b=.30+fb*.14;}
  const ef=Math.max(0,Math.abs(nx)-.45)*2.5;
  return[Math.min(1,r+ef*.07),Math.min(1,g+ef*.28),Math.min(1,b+ef*.20)];
}

function decodeF16(b64,n){
  const bin=atob(b64),u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  const u16=new Uint16Array(u8.buffer),f32=new Float32Array(n);
  for(let i=0;i<n;i++){
    const h=u16[i],s=(h&0x8000)?-1:1,e=(h&0x7c00)>>10,f=h&0x03ff;
    if(e===0)f32[i]=s*5.96e-8*f;
    else if(e===31)f32[i]=f?NaN:s*Infinity;
    else f32[i]=s*Math.pow(2,e-15)*(1+f*9.765625e-4);
  }
  return f32;
}

// Three.js
const cv=document.getElementById('c');
let W=window.innerWidth,H=window.innerHeight;
const rnd=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
rnd.setPixelRatio(Math.min(devicePixelRatio,2));
rnd.setSize(W,H);
rnd.setClearColor(0x030308,1);
const sc=new THREE.Scene();
sc.fog=new THREE.FogExp2(0x030308,0.022);
const cam=new THREE.PerspectiveCamera(50,W/H,0.1,200);

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  rnd.setSize(W,H);cam.aspect=W/H;cam.updateProjectionMatrix();
});

// Particles
const pos=new Float32Array(NTOT*3),col=new Float32Array(NTOT*3);
const tPos=new Float32Array(NT*3),tCol=new Float32Array(NT*3);
const iPos=new Float32Array(NTOT*3),vel=new Float32Array(NTOT*3);
let ready=false,rotY=0,rotX=0,frame=0;
const t0=Date.now();

for(let i=0;i<NTOT;i++){
  const rd=(i<NT?8:5)+Math.random()*(i<NT?5:14);
  const th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI;
  iPos[i*3]=pos[i*3]=rd*Math.cos(th)*Math.cos(ph);
  iPos[i*3+1]=pos[i*3+1]=rd*Math.sin(ph)*1.3;
  iPos[i*3+2]=pos[i*3+2]=rd*Math.sin(th)*Math.cos(ph);
  vel[i*3]=(Math.random()-.5)*(i<NT?.022:.007);
  vel[i*3+1]=(Math.random()-.5)*(i<NT?.016:.005);
  vel[i*3+2]=(Math.random()-.5)*(i<NT?.022:.007);
  const vc=VC[i%VC.length],br=i<NT?.6:.28;
  col[i*3]=vc[0]*br;col[i*3+1]=vc[1]*br;col[i*3+2]=vc[2]*br;
}

function buildFallback(){
  for(let i=0;i<NT;i++){
    const t=i/NT;let x,y;
    if(t<.3){x=-.5+Math.random()*.18;y=(Math.random()-.5)*1.8;}
    else if(t<.65){const a=Math.random()*Math.PI;x=.1+Math.cos(a)*.42+Math.random()*.08;y=.5+Math.sin(a)*.38+Math.random()*.05;}
    else{const a=Math.random()*Math.PI;x=.1+Math.cos(a)*.48+Math.random()*.08;y=-.5+Math.sin(a)*.44+Math.random()*.05;}
    tPos[i*3]=x*SC;tPos[i*3+1]=y*SC;tPos[i*3+2]=(Math.random()-.5)*.2;
    const[r,g,b]=toolColor(x,y,0);tCol[i*3]=r;tCol[i*3+1]=g;tCol[i*3+2]=b;
  }
  ready=true;
}

Promise.all([
  fetch('/bkg/p6k.txt').then(r=>r.text()),
  fetch('/bkg/n6k.txt').then(r=>r.text()),
]).then(([pb,nb])=>{
  const RP=decodeF16(pb,NT*3),RN=decodeF16(nb,NT*3);
  for(let i=0;i<NT;i++){
    tPos[i*3]=RP[i*3]*SC;tPos[i*3+1]=RP[i*3+1]*SC;tPos[i*3+2]=RP[i*3+2]*SC;
    const[r,g,b]=toolColor(RP[i*3],RP[i*3+1],RN[i*3]);
    tCol[i*3]=r;tCol[i*3+1]=g;tCol[i*3+2]=b;
  }
  ready=true;
}).catch(buildFallback);

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(col,3));
const mat=new THREE.PointsMaterial({
  size:0.075,vertexColors:true,transparent:true,opacity:1,
  sizeAttenuation:true,blending:THREE.AdditiveBlending,depthWrite:false
});
const pts=new THREE.Points(geo,mat);
sc.add(pts);

const CAM=[
  {p:[0,-3.5,10],l:[0,0.3,0]},
  {p:[-0.5,-0.5,8],l:[0,0.1,0]},
  {p:[-2.4,2.2,6.2],l:[0.15,0,0]},
  {p:[-2.7,2.4,5.4],l:[0.15,0,0]}
];

const capMain=document.getElementById('capMain');
const capSub=document.getElementById('capSub');
const mv=document.getElementById('mv');
let captionDone=[false,false,false,false];
let revealStarted=false;

function setCaption(txt,sub,color){
  capMain.textContent=txt;
  if(color)capMain.style.color=color;
  capSub.textContent=sub||'';
}

function animate(){
  requestAnimationFrame(animate);
  frame++;
  const el=(Date.now()-t0)/1e3;

  let phase=3;
  if(el<PHASE_T[1])phase=0;
  else if(el<PHASE_T[2])phase=1;
  else if(el<PHASE_T[3])phase=2;
  if(el>=PHASE_T[4]){window.parent.postMessage('done','*');return;}

  if(!captionDone[0])captionDone[0]=true;
  if(phase>=1&&!captionDone[1]){captionDone[1]=true;setCaption('STARTED AS A DREAM');}
  if(phase>=2&&!captionDone[2]){captionDone[2]=true;setCaption("BUILDER'S KNOWLEDGE GARDEN",'DREAM \u2192 DESIGN \u2192 PLAN \u2192 BUILD \u2192 DELIVER \u2192 GROW','rgba(29,158,117,.85)');}
  if(phase>=3&&!captionDone[3]){
    captionDone[3]=true;
    setCaption('THE OPERATING SYSTEM FOR CONSTRUCTION','','rgba(255,255,255,.45)');
    // Fade in the photorealistic model
    if(!revealStarted){
      revealStarted=true;
      mv.style.opacity='1';
      mv.dismissPoster && mv.dismissPoster();
    }
  }

  const p=pos,c=col;

  // Phase 3: fade out particles as model fades in
  if(phase===3){
    const tN=clamp((el-PHASE_T[3])/3,0,1);
    mat.opacity=Math.max(0,1-tN*1.4);
  }

  if(phase===0){
    for(let i=0;i<NTOT;i++){
      const t=el*.28;
      p[i*3]+=vel[i*3]+Math.sin(t+i*.19)*.002;
      p[i*3+1]+=vel[i*3+1]+Math.cos(t+i*.14)*.0015;
      p[i*3+2]+=vel[i*3+2]+Math.sin(t*.65+i*.21)*.002;
      const d2=p[i*3]**2+p[i*3+1]**2+p[i*3+2]**2;
      if(d2>196){vel[i*3]*=-.72;vel[i*3+1]*=-.72;vel[i*3+2]*=-.72;}
      if(frame%4===i%4){
        const vc=VC[Math.floor((Math.sin(i+el)*.5+.5)*VC.length)];
        const br=.4+Math.sin(el*1.6+i*.5)*.2;
        c[i*3]=vc[0]*br;c[i*3+1]=vc[1]*br;c[i*3+2]=vc[2]*br;
      }
    }
    rotY+=.0018;rotX=Math.sin(el*.11)*.07;
    mat.size=.062+Math.sin(el*1.9)*.012;

  }else if(phase===1&&ready){
    const tN=clamp((el-PHASE_T[1])/(PHASE_T[2]-PHASE_T[1]),0,1),sp=easeOut(tN);
    for(let i=0;i<NT;i++){
      const ang=tN*Math.PI*2.4,r=1-easeOut(tN),pull=.04+sp*.14;
      p[i*3]+=(tPos[i*3]+Math.sin(ang+i*.011)*r*.6-p[i*3])*pull;
      p[i*3+1]+=(tPos[i*3+1]+Math.cos(ang+i*.011)*r*.35-p[i*3+1])*pull;
      p[i*3+2]+=(tPos[i*3+2]-p[i*3+2])*pull*.6;
      c[i*3]=lerpN(c[i*3],tCol[i*3],sp*.13);
      c[i*3+1]=lerpN(c[i*3+1],tCol[i*3+1],sp*.13);
      c[i*3+2]=lerpN(c[i*3+2],tCol[i*3+2],sp*.13);
    }
    for(let i=NT;i<NTOT;i++){p[i*3]+=vel[i*3];p[i*3+1]+=vel[i*3+1];p[i*3+2]+=vel[i*3+2];c[i*3]*=.997;c[i*3+1]*=.997;c[i*3+2]*=.997;}
    rotY=lerpN(rotY,0,.015);rotX=lerpN(rotX,0,easeInOut(tN));
    mat.size=lerpN(.072,.055,tN);

  }else if(phase>=2&&ready){
    const pulse=.5+.5*Math.sin(el*1.85),gb=.07+pulse*.14;
    for(let i=0;i<NT;i++){
      p[i*3]=tPos[i*3]+(Math.random()-.5)*.004;p[i*3]+=(tPos[i*3]-p[i*3])*.2;
      p[i*3+1]=tPos[i*3+1]+(Math.random()-.5)*.004;p[i*3+1]+=(tPos[i*3+1]-p[i*3+1])*.2;
      p[i*3+2]=tPos[i*3+2]+(Math.random()-.5)*.003;p[i*3+2]+=(tPos[i*3+2]-p[i*3+2])*.2;
      const gw=gb*(.4+tCol[i*3+1]*1.8);
      c[i*3]=Math.min(1,tCol[i*3]+gw*.45);
      c[i*3+1]=Math.min(1,tCol[i*3+1]+gw);
      c[i*3+2]=Math.min(1,tCol[i*3+2]+gw*.65);
    }
    for(let i=NT;i<NTOT;i++){c[i*3]*=.991;c[i*3+1]*=.991;c[i*3+2]*=.991;}
    const tN=clamp((el-PHASE_T[2])/2.8,0,1);
    rotY=lerpN(0,.22,easeInOut(tN))+Math.sin(el*.07)*.04;
    rotX=Math.sin(el*.14)*.03;
    mat.size=.055+pulse*.018;
  }

  geo.attributes.position.needsUpdate=true;
  geo.attributes.color.needsUpdate=true;

  let ci=0,ct=0;
  if(el<PHASE_T[1]){ci=0;ct=0;}
  else if(el<PHASE_T[2]){ci=0;ct=easeInOut(clamp((el-PHASE_T[1])/(PHASE_T[2]-PHASE_T[1]),0,1));}
  else if(el<PHASE_T[3]){ci=1;ct=easeInOut(clamp((el-PHASE_T[2])/(PHASE_T[3]-PHASE_T[2]),0,1));}
  else{ci=2;ct=clamp((el-PHASE_T[3])/2.2,0,1);}
  const c0=CAM[ci],c1=CAM[ci+1]||CAM[ci];
  cam.position.set(lerpN(c0.p[0],c1.p[0],ct),lerpN(c0.p[1],c1.p[1],ct),lerpN(c0.p[2],c1.p[2],ct));
  cam.lookAt(lerpN(c0.l[0],c1.l[0],ct),lerpN(c0.l[1],c1.l[1],ct),0);

  pts.rotation.y=rotY;pts.rotation.x=rotX;
  sc.fog.density=.02+Math.sin(el*.4)*.004;
  rnd.render(sc,cam);
}

animate();
document.getElementById('skip').onclick=()=>{
  mv.style.opacity='1';
  mv.style.transition='none';
  setTimeout(()=>window.parent.postMessage('done','*'),100);
};
</script>
</body>
</html>
