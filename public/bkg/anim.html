<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030308}
canvas{width:100%;height:100%;display:block}
#cap{position:fixed;bottom:52px;left:0;right:0;text-align:center;pointer-events:none}
#capMain{font-family:monospace;font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.45);text-transform:uppercase;transition:color .8s}
#capSub{font-family:monospace;font-size:9px;letter-spacing:.12em;color:rgba(29,158,117,.7);margin-top:8px}
#skip{position:fixed;top:20px;right:20px;padding:6px 14px;background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);border-radius:20px;font-size:10px;letter-spacing:.1em;font-family:monospace;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cap"><div id="capMain">EVERY GREAT BUILDING</div><div id="capSub"></div></div>
<button id="skip">SKIP &rarr;</button>
<script>
const NT=6000,NV=4000,NTOT=NT+NV,SC=2.1;
const PHASE_T=[0,5,10.5,15.5,22];
const VC=[[.16,.26,.55],[.58,.22,.07],[.44,.44,.50],[.20,.16,.13],[.10,.48,.40],[.36,.16,.07]];

function lerpN(a,b,t){return a+(b-a)*t}
function easeOut(t){return 1-Math.pow(1-t,4)}
function easeInOut(t){return t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1}
function clamp(v,a,b){return Math.min(b,Math.max(a,v))}

function toolColor(x,y,nx){
  const fb=Math.max(0,y*.5+.6);let r,g,b;
  if(y>.55){r=.18+fb*.12;g=.28+fb*.1;b=.60+fb*.14;}
  else if(x<-.28){const t=Math.sin(y*5+2)*.5+.5;r=.52+t*.22;g=.22+t*.1;b=.05;}
  else if(x>.10&&y>.06){const t=(Math.sin(y*14)+1)*.5;r=.42+t*.38;g=.42+t*.38;b=.46+t*.38;}
  else if(x>.10&&y<-.06){r=.26+fb*.1;g=.20+fb*.07;b=.16+fb*.05;}
  else{r=.28+fb*.14;g=.28+fb*.14;b=.30+fb*.14;}
  const ef=Math.max(0,Math.abs(nx)-.45)*2.5;
  return[Math.min(1,r+ef*.07),Math.min(1,g+ef*.28),Math.min(1,b+ef*.20)];
}

function decodeF16(b64,n){
  const bin=atob(b64),u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
  const u16=new Uint16Array(u8.buffer),f32=new Float32Array(n);
  for(let i=0;i<n;i++){
    const h=u16[i],s=(h&0x8000)?-1:1,e=(h&0x7c00)>>10,f=h&0x03ff;
    if(e===0)f32[i]=s*5.96e-8*f;
    else if(e===31)f32[i]=f?NaN:s*Infinity;
    else f32[i]=s*Math.pow(2,e-15)*(1+f*9.765625e-4);
  }
  return f32;
}

const cv=document.getElementById('c');
let W=cv.width=window.innerWidth,H=cv.height=window.innerHeight;
window.addEventListener('resize',()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;});
const ctx=cv.getContext('2d');

const pos=new Float32Array(NTOT*3),col=new Float32Array(NTOT*3);
const tPos=new Float32Array(NT*3),tCol=new Float32Array(NT*3);
const iPos=new Float32Array(NTOT*3),vel=new Float32Array(NTOT*3);
let ready=false,rotY=0,rotX=0,frame=0;
const t0=Date.now();
let captionDone=[false,false,false,false];

for(let i=0;i<NTOT;i++){
  const rd=(i<NT?8:5)+Math.random()*(i<NT?5:14),th=Math.random()*Math.PI*2,ph=(Math.random()-.5)*Math.PI;
  iPos[i*3]=pos[i*3]=rd*Math.cos(th)*Math.cos(ph);
  iPos[i*3+1]=pos[i*3+1]=rd*Math.sin(ph)*1.3;
  iPos[i*3+2]=pos[i*3+2]=rd*Math.sin(th)*Math.cos(ph);
  vel[i*3]=(Math.random()-.5)*(i<NT?.022:.007);
  vel[i*3+1]=(Math.random()-.5)*(i<NT?.016:.005);
  vel[i*3+2]=(Math.random()-.5)*(i<NT?.022:.007);
  const vc=VC[i%VC.length],br=i<NT?.6:.28;
  col[i*3]=vc[0]*br;col[i*3+1]=vc[1]*br;col[i*3+2]=vc[2]*br;
}

// Procedural fallback B
function buildFallback(){
  for(let i=0;i<NT;i++){
    let x,y;
    const t=i/NT;
    if(t<.3){x=-.5+Math.random()*.18;y=(Math.random()-.5)*1.8;}
    else if(t<.65){const a=Math.random()*Math.PI;x=.1+Math.cos(a)*.42+Math.random()*.08;y=.5+Math.sin(a)*.38+Math.random()*.05;}
    else{const a=Math.random()*Math.PI;x=.1+Math.cos(a)*.48+Math.random()*.08;y=-.5+Math.sin(a)*.44+Math.random()*.05;}
    tPos[i*3]=x*SC;tPos[i*3+1]=y*SC;tPos[i*3+2]=(Math.random()-.5)*.2;
    const[r,g,b]=toolColor(x,y,0);tCol[i*3]=r;tCol[i*3+1]=g;tCol[i*3+2]=b;
  }
  ready=true;
}

Promise.all([fetch('/bkg/p6k.txt').then(r=>r.text()),fetch('/bkg/n6k.txt').then(r=>r.text())])
  .then(([pb,nb])=>{
    const RP=decodeF16(pb,NT*3),RN=decodeF16(nb,NT*3);
    for(let i=0;i<NT;i++){
      tPos[i*3]=RP[i*3]*SC;tPos[i*3+1]=RP[i*3+1]*SC;tPos[i*3+2]=RP[i*3+2]*SC;
      const[r,g,b]=toolColor(RP[i*3],RP[i*3+1],RN[i*3]);
      tCol[i*3]=r;tCol[i*3+1]=g;tCol[i*3+2]=b;
    }
    ready=true;
  }).catch(buildFallback);

function project(x,y,z){
  const x1=x*Math.cos(rotY)-z*Math.sin(rotY),z1=x*Math.sin(rotY)+z*Math.cos(rotY);
  const y1=y*Math.cos(rotX)-z1*Math.sin(rotX),z2=y*Math.sin(rotX)+z1*Math.cos(rotX);
  const fov=5.5,d=fov/(fov+z2+12);
  return[W/2+x1*d*W*.42,H/2-y1*d*H*.55,d];
}

const capMain=document.getElementById('capMain'),capSub=document.getElementById('capSub');
function setCaption(txt,sub,color){capMain.textContent=txt;capMain.style.color=color||'rgba(255,255,255,.45)';capSub.textContent=sub||'';}

function draw(){
  const el=(Date.now()-t0)/1e3;frame++;
  let phase=3;
  if(el<PHASE_T[1])phase=0;
  else if(el<PHASE_T[2])phase=1;
  else if(el<PHASE_T[3])phase=2;
  if(el>=PHASE_T[4]){window.parent.postMessage('done','*');return;}

  if(!captionDone[0])captionDone[0]=true;
  if(phase>=1&&!captionDone[1]){captionDone[1]=true;setCaption('STARTED AS A DREAM');}
  if(phase>=2&&!captionDone[2]){captionDone[2]=true;setCaption("BUILDER'S KNOWLEDGE GARDEN",'DREAM \u2192 DESIGN \u2192 PLAN \u2192 BUILD \u2192 DELIVER \u2192 GROW','rgba(29,158,117,.85)');}
  if(phase>=3&&!captionDone[3]){captionDone[3]=true;setCaption('THE OPERATING SYSTEM FOR CONSTRUCTION','');}

  ctx.fillStyle='#030308';ctx.fillRect(0,0,W,H);

  if(phase===0){
    for(let i=0;i<NTOT;i++){
      const t=el*.28;
      pos[i*3]+=vel[i*3]+Math.sin(t+i*.19)*.002;
      pos[i*3+1]+=vel[i*3+1]+Math.cos(t+i*.14)*.0015;
      pos[i*3+2]+=vel[i*3+2]+Math.sin(t*.65+i*.21)*.002;
      const d2=pos[i*3]**2+pos[i*3+1]**2+pos[i*3+2]**2;
      if(d2>196){vel[i*3]*=-.72;vel[i*3+1]*=-.72;vel[i*3+2]*=-.72;}
      if(frame%4===i%4){const vc=VC[Math.floor((Math.sin(i+el)*.5+.5)*VC.length)],br=.4+Math.sin(el*1.6+i*.5)*.2;col[i*3]=vc[0]*br;col[i*3+1]=vc[1]*br;col[i*3+2]=vc[2]*br;}
    }
    rotY+=.0018;rotX=Math.sin(el*.11)*.07;
  } else if(phase===1&&ready){
    const tN=clamp((el-PHASE_T[1])/(PHASE_T[2]-PHASE_T[1]),0,1),sp=easeOut(tN);
    for(let i=0;i<NT;i++){
      const ang=tN*Math.PI*2.4,r=1-easeOut(tN),pull=.04+sp*.14;
      pos[i*3]+=(tPos[i*3]+Math.sin(ang+i*.011)*r*.6-pos[i*3])*pull;
      pos[i*3+1]+=(tPos[i*3+1]+Math.cos(ang+i*.011)*r*.35-pos[i*3+1])*pull;
      pos[i*3+2]+=(tPos[i*3+2]-pos[i*3+2])*pull*.6;
      col[i*3]=lerpN(col[i*3],tCol[i*3],sp*.13);col[i*3+1]=lerpN(col[i*3+1],tCol[i*3+1],sp*.13);col[i*3+2]=lerpN(col[i*3+2],tCol[i*3+2],sp*.13);
    }
    for(let i=NT;i<NTOT;i++){pos[i*3]+=vel[i*3];pos[i*3+1]+=vel[i*3+1];pos[i*3+2]+=vel[i*3+2];col[i*3]*=.997;col[i*3+1]*=.997;col[i*3+2]*=.997;}
    rotY=lerpN(rotY,0,.02);rotX=lerpN(rotX,0,easeInOut(tN));
  } else if(phase>=2&&ready){
    const pulse=.5+.5*Math.sin(el*1.85),gb=.07+pulse*.14;
    for(let i=0;i<NT;i++){
      pos[i*3]=tPos[i*3]+(Math.random()-.5)*.005;pos[i*3]+=(tPos[i*3]-pos[i*3])*.18;
      pos[i*3+1]=tPos[i*3+1]+(Math.random()-.5)*.005;pos[i*3+1]+=(tPos[i*3+1]-pos[i*3+1])*.18;
      pos[i*3+2]=tPos[i*3+2]+(Math.random()-.5)*.003;pos[i*3+2]+=(tPos[i*3+2]-pos[i*3+2])*.18;
      const gw=gb*(.4+tCol[i*3+1]*1.8);
      col[i*3]=Math.min(1,tCol[i*3]+gw*.45);col[i*3+1]=Math.min(1,tCol[i*3+1]+gw);col[i*3+2]=Math.min(1,tCol[i*3+2]+gw*.65);
    }
    for(let i=NT;i<NTOT;i++){col[i*3]*=.991;col[i*3+1]*=.991;col[i*3+2]*=.991;}
    const tN=clamp((el-PHASE_T[2])/2.8,0,1);
    rotY=lerpN(0,.22,easeInOut(tN))+Math.sin(el*.07)*.04;rotX=Math.sin(el*.14)*.03;
  }

  const list=[];
  for(let i=0;i<NTOT;i++){
    const[sx,sy,d]=project(pos[i*3],pos[i*3+1],pos[i*3+2]);
    if(sx<-20||sx>W+20||sy<-20||sy>H+20)continue;
    list.push([sx,sy,d,col[i*3],col[i*3+1],col[i*3+2]]);
  }
  list.sort((a,b)=>a[2]-b[2]);
  const baseR=Math.min(W,H)*.007;
  for(const[sx,sy,d,r,g,b]of list){
    const sz=baseR*d*8;if(sz<.4)continue;
    ctx.fillStyle=`rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},${Math.min(1,sz*.6+.15).toFixed(2)})`;
    ctx.beginPath();ctx.arc(sx,sy,Math.max(.4,sz*.5),0,Math.PI*2);ctx.fill();
  }
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
document.getElementById('skip').onclick=()=>window.parent.postMessage('done','*');
</script>
</body>
</html>
