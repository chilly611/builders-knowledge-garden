<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hero plates — the DNA</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body style="padding:18px 22px">
<div class="eng" style="margin-bottom:10px">THE FOUR HERO PLATES · GROUND TRUTH FOR COLOR, LINE &amp; FEEL</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  
  <div>
    <div style="aspect-ratio:1.1/1;background:var(--paper-cream);border:1px solid var(--paper-edge);box-shadow:var(--shadow-page-2);overflow:hidden;display:flex;align-items:center;justify-content:center">
      <img src="../assets/plates/builders-hammer.png" style="width:100%;height:100%;object-fit:cover" alt="Master mark">
    </div>
    <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite);letter-spacing:-0.01em">Master mark</div>
    <div class="eng" style="margin-top:1px">BKG</div>
  </div>
  <div>
    <div style="aspect-ratio:1.1/1;background:var(--paper-cream);border:1px solid var(--paper-edge);box-shadow:var(--shadow-page-2);overflow:hidden;display:flex;align-items:center;justify-content:center">
      <img src="../assets/plates/chrome-killer-app.png" style="width:100%;height:100%;object-fit:cover" alt="Killer App">
    </div>
    <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite);letter-spacing:-0.01em">Killer App</div>
    <div class="eng" style="margin-top:1px">TEAL · RUST</div>
  </div>
  <div>
    <div style="aspect-ratio:1.1/1;background:var(--paper-cream);border:1px solid var(--paper-edge);box-shadow:var(--shadow-page-2);overflow:hidden;display:flex;align-items:center;justify-content:center">
      <img src="../assets/plates/chrome-dream-machine.png" style="width:100%;height:100%;object-fit:cover" alt="Dream Machine">
    </div>
    <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite);letter-spacing:-0.01em">Dream Machine</div>
    <div class="eng" style="margin-top:1px">BRASS · AMBER</div>
  </div>
  <div>
    <div style="aspect-ratio:1.1/1;background:var(--paper-cream);border:1px solid var(--paper-edge);box-shadow:var(--shadow-page-2);overflow:hidden;display:flex;align-items:center;justify-content:center">
      <img src="../assets/plates/chrome-knowledge-garden.png" style="width:100%;height:100%;object-fit:cover" alt="Knowledge Garden">
    </div>
    <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite);letter-spacing:-0.01em">Knowledge Garden</div>
    <div class="eng" style="margin-top:1px">SAGE</div>
  </div>
</div>
</body></html>
