<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Borders & hairlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:14px">BORDERS · 1PX SEPIA HAIRLINE IS THE DEFAULT</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="border:1px solid var(--paper-edge);padding:12px;border-radius:var(--radius-xs);background:var(--bg-raised)">
      <span class="eng">DEFAULT · 1px solid --paper-edge</span>
    </div>
    <div style="border:1.5px solid var(--specimen-brass-aged);padding:12px;border-radius:var(--radius-xs);background:var(--bg-raised)">
      <span class="eng">STRONG · 1.5px solid --specimen-brass-aged</span>
    </div>
    <div style="border:1px dashed var(--paper-edge);padding:12px;border-radius:var(--radius-xs)">
      <span class="eng">DASHED LEADER · 1px dashed --paper-edge</span>
    </div>
    <div style="outline:1px solid var(--paper-edge);outline-offset:3px;border:1.5px solid var(--specimen-brass-aged);padding:12px;border-radius:var(--radius-xs);background:var(--bg-raised);margin:4px">
      <span class="eng">DOUBLE RULE · outline-offset for plate framing</span>
    </div>
  </div>
</body></html>
