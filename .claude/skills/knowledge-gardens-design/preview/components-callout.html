<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Engineering callout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body style="padding:24px 30px">
<style>
  .stage{position:relative;height:200px;background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);overflow:hidden}
  .stage::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(124,98,53,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(124,98,53,0.08) 1px,transparent 1px);background-size:18px 18px}
  .obj{position:absolute;width:80px;height:80px;background:var(--specimen-teal);border:1.5px solid var(--specimen-teal-deep);border-radius:50%;top:60px;left:80px;box-shadow:inset 0 -10px 16px rgba(0,0,0,0.18)}
  .leader{position:absolute;top:88px;left:160px;right:auto;height:1px;border-top:1px dashed var(--ink-faded);width:130px}
  .leader::after{content:'';position:absolute;right:-8px;top:-4px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--ink-faded);background:var(--paper-cream)}
  .annot{position:absolute;left:298px;top:62px;width:200px}
  .annot h4{font-family:var(--font-mono);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-faded);margin:0}
  .annot p{font-family:var(--font-editorial);font-style:italic;font-size:14px;color:var(--ink-script);margin:4px 0 0;line-height:1.3}
  .dim{position:absolute;left:80px;top:170px;width:80px;text-align:center;font-family:var(--font-mono);font-size:10px;color:var(--ink-faded);letter-spacing:0.1em}
  .dim::before,.dim::after{content:'';position:absolute;top:-6px;width:1px;height:6px;background:var(--ink-faded)}
  .dim::before{left:0}.dim::after{right:0}
  .dim span{background:var(--bg-raised);padding:0 4px}
</style>
<div class="stage">
  <div class="obj"></div>
  <div class="leader"></div>
  <div class="annot">
    <h4>NODE · 14B</h4>
    <p>Tie‑in node — verify torque at next pour cycle.</p>
  </div>
  <div class="dim"><span>ø 80 MM</span></div>
</div>
</body></html>
