<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:10px">SPACING · 4PX BASE · TOKENS --space-1 …  --space-24</div>
  <div style="display:flex;flex-direction:column;gap:4px">
    <div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-1</div>
        <div style="height:14px;width:4px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">4px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-2</div>
        <div style="height:14px;width:8px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">8px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-3</div>
        <div style="height:14px;width:12px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">12px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-4</div>
        <div style="height:14px;width:16px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">16px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-5</div>
        <div style="height:14px;width:20px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">20px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-6</div>
        <div style="height:14px;width:24px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">24px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-8</div>
        <div style="height:14px;width:32px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">32px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-10</div>
        <div style="height:14px;width:40px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">40px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-12</div>
        <div style="height:14px;width:48px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>

      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-16</div>
        <div style="height:14px;width:64px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>

      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-20</div>
        <div style="height:14px;width:80px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">80px</div>
      </div><div style="display:flex;align-items:center;gap:12px">
        <div class="eng" style="width:90px">--space-24</div>
        <div style="height:14px;width:96px;background:var(--specimen-teal);border-radius:var(--radius-xs)"></div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--ink-faded)">96px</div>
      </div>
  </div>
