<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevation & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:14px">PAGES SIT ON A WALL — SHORT, WARM SHADOWS · NO WIDE BLURS</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px">
    
    <div style="text-align:center">
      <div style="height:80px;background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);box-shadow:0 1px 0 var(--paper-edge);margin:0 6px"></div>
      <div style="margin-top:14px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">--shadow-page-1</div>
      <div class="eng" style="margin-top:2px">HAIRLINE RULE</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);box-shadow:0 1px 0 var(--paper-edge), 0 2px 4px rgba(90,59,31,0.08);margin:0 6px"></div>
      <div style="margin-top:14px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">--shadow-page-2</div>
      <div class="eng" style="margin-top:2px">DEFAULT CARD</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);box-shadow:0 1px 0 var(--paper-edge), 0 6px 14px rgba(90,59,31,0.10);margin:0 6px"></div>
      <div style="margin-top:14px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">--shadow-page-3</div>
      <div class="eng" style="margin-top:2px">RAISED PLATE</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);box-shadow:0 1px 0 var(--paper-edge), 0 10px 28px rgba(90,59,31,0.14), 0 2px 6px rgba(90,59,31,0.08);margin:0 6px"></div>
      <div style="margin-top:14px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">--shadow-plate</div>
      <div class="eng" style="margin-top:2px">HERO SPECIMEN PLATE</div>
    </div>
  </div>
</body></html>
