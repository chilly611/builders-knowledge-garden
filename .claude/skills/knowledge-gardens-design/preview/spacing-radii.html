<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Corner radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:14px">RADII · PAPER ISN'T VERY ROUND — TIGHT BY DEFAULT</div>
  <div style="display:flex;gap:18px;align-items:flex-end">
    
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:1px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">hairline</div>
      <div class="eng" style="margin-top:2px">1PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:2px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">xs</div>
      <div class="eng" style="margin-top:2px">2PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:3px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">sm</div>
      <div class="eng" style="margin-top:2px">3PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:4px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">md</div>
      <div class="eng" style="margin-top:2px">4PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:6px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">lg</div>
      <div class="eng" style="margin-top:2px">6PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:10px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">xl</div>
      <div class="eng" style="margin-top:2px">10PX</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:999px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">pill</div>
      <div class="eng" style="margin-top:2px">999</div>
    </div>
    <div style="text-align:center">
      <div style="width:72px;height:72px;background:var(--bg-raised);border:1.5px solid var(--specimen-brass-aged);border-radius:50%"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">disk</div>
      <div class="eng" style="margin-top:2px">50%</div>
    </div>
  </div>
</body></html>
