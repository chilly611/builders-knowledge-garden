<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pins & seals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body style="padding:20px 24px">
<div class="eng" style="margin-bottom:12px">PINS · WAX SEALS · TAGS — FOR COLLABORATIVE MARGIN NOTES</div>
<div style="display:flex;gap:26px;align-items:center;flex-wrap:wrap">

  <!-- wax seal -->
  <div style="text-align:center">
    <svg width="80" height="80" viewBox="0 0 80 80">
      <defs>
        <radialGradient id="wax" cx="35%" cy="30%" r="80%">
          <stop offset="0%" stop-color="#C26050"/>
          <stop offset="60%" stop-color="#A53A2D"/>
          <stop offset="100%" stop-color="#6E2419"/>
        </radialGradient>
      </defs>
      <path d="M40 6 L48 16 L60 12 L58 24 L72 28 L62 36 L70 48 L57 50 L58 64 L46 58 L40 70 L34 58 L22 64 L23 50 L10 48 L18 36 L8 28 L22 24 L20 12 L32 16 Z" fill="url(#wax)" stroke="#6E2419" stroke-width="0.7"/>
      <text x="40" y="46" text-anchor="middle" font-family="Archivo Black" font-size="18" fill="#F2E9D2">B</text>
    </svg>
    <div class="eng" style="margin-top:4px">WAX SEAL</div>
  </div>

  <!-- pin tag -->
  <div style="text-align:center">
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--paper-vellum);border:1px solid var(--specimen-brass-aged);border-radius:var(--radius-xs);padding:6px 14px 6px 10px;position:relative;box-shadow:var(--shadow-page-2)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--specimen-rust);border:1px solid var(--specimen-rust-deep)"></span>
      <span style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-graphite)">Flagged · M.B.</span>
      <span style="position:absolute;left:-7px;top:50%;width:6px;height:6px;border-radius:50%;background:var(--specimen-brass-aged);transform:translateY(-50%);box-shadow:0 0 0 2px var(--paper-cream)"></span>
    </div>
    <div class="eng" style="margin-top:6px">PINNED COMMENT</div>
  </div>

  <!-- archival tag -->
  <div style="text-align:center">
    <div style="display:inline-flex;align-items:stretch;background:var(--bg-raised);border:1px solid var(--paper-edge);box-shadow:var(--shadow-page-2);font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-graphite)">
      <span style="background:var(--ink-graphite);color:var(--paper-cream);padding:4px 8px">NO. 0014</span>
      <span style="padding:4px 10px;border-right:1px dashed var(--paper-edge)">BUILD</span>
      <span style="padding:4px 10px">2026‑05‑18</span>
    </div>
    <div class="eng" style="margin-top:6px">ARCHIVE TAG</div>
  </div>

  <!-- compass marker -->
  <div style="text-align:center">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="24" fill="#F2E9D2" stroke="#7C6235" stroke-width="1.4"/>
      <circle cx="28" cy="28" r="14" fill="none" stroke="#7C6235" stroke-width="0.6" stroke-dasharray="2 2"/>
      <path d="M28 8 L31 28 L25 28 Z" fill="#3C7A8A"/>
      <path d="M28 48 L25 28 L31 28 Z" fill="#A53A2D"/>
      <circle cx="28" cy="28" r="2" fill="#2A2620"/>
    </svg>
    <div class="eng" style="margin-top:4px">COMPASS MARKER</div>
  </div>

</div>
</body></html>
