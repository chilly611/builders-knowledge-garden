<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Amber accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:10px">AMBER · HIGHLIGHTS · WARNING · ILLUMINATION</div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
    
    <div class="swatch" style="background:#C68A3D;height:90px">
      <div class="swatch-meta">
        <span>specimen-amber</span><span class="hex">#C68A3D</span>
      </div>
    </div>
    <div class="swatch" style="background:#8C5E22;height:90px">
      <div class="swatch-meta">
        <span>specimen-amber-deep</span><span class="hex">#8C5E22</span>
      </div>
    </div>
  </div>
  <div style="margin-top:12px;font-family:var(--font-editorial);font-style:italic;font-size:14px;color:var(--ink-faded)">
    Used for non‑critical highlights — verification dots on a gauge, XP/streak motes, the warm glow of the Dream Machine surface.
  </div>
</body></html>
