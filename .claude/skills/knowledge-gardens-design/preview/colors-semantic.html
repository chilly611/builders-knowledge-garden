<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:10px">SEMANTIC STATUS · ALIASES INTO THE SPECIMEN PALETTE</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    
    <div>
      <div class="swatch" style="background:#5E7A56;height:74px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:14px;color:var(--ink-graphite)">Success</div>
      <div class="eng" style="margin-top:2px">--success  →  --specimen-sage</div>
    </div>
    <div>
      <div class="swatch" style="background:#C68A3D;height:74px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:14px;color:var(--ink-graphite)">Warning</div>
      <div class="eng" style="margin-top:2px">--warning  →  --specimen-amber</div>
    </div>
    <div>
      <div class="swatch" style="background:#A53A2D;height:74px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:14px;color:var(--ink-graphite)">Danger</div>
      <div class="eng" style="margin-top:2px">--danger  →  --specimen-rust</div>
    </div>
    <div>
      <div class="swatch" style="background:#3C7A8A;height:74px"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:14px;color:var(--ink-graphite)">Info</div>
      <div class="eng" style="margin-top:2px">--info  →  --specimen-teal</div>
    </div>
  </div>
</body></html>
