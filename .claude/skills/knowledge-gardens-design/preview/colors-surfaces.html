<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surface accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:10px">FOUR BKG SURFACES · EACH WITH A SIGNATURE ACCENT</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div>
      <div style="height:64px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:linear-gradient(135deg,#3C7A8A 0%, #3C7A8A 55%, #A53A2D 55%, #A53A2D 100%)"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Killer App</div>
      <div class="eng" style="margin-top:2px">TEAL + RUST</div>
    </div>
    <div>
      <div style="height:64px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:linear-gradient(135deg,#B08D5C 0%,#B08D5C 55%,#C68A3D 55%,#C68A3D 100%)"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Dream Machine</div>
      <div class="eng" style="margin-top:2px">BRASS + AMBER</div>
    </div>
    <div>
      <div style="height:64px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:#5E7A56"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Knowledge Garden</div>
      <div class="eng" style="margin-top:2px">SAGE</div>
    </div>
    <div>
      <div style="height:64px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:#5A3B1F"></div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Umbrella</div>
      <div class="eng" style="margin-top:2px">SEPIA ON CREAM</div>
    </div>
  </div>
</body></html>
