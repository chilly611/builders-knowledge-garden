<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surface architecture</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body style="padding:20px 26px">
<div class="eng" style="margin-bottom:12px">FOUR NAMED SURFACES UNDER ONE UMBRELLA · BKG</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  
  <div style="background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);overflow:hidden;box-shadow:var(--shadow-page-2)">
    <div style="height:50px;background:linear-gradient(135deg,#3C7A8A 0%,#3C7A8A 55%,#A53A2D 55%,#A53A2D 100%);border-bottom:1px solid var(--paper-edge);position:relative">
      <img src="../assets/plates/chrome-killer-app.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply;opacity:0.55">
    </div>
    <div style="padding:10px 12px 12px">
      <div style="font-family:var(--font-display);font-size:14px;letter-spacing:-0.01em;color:var(--ink-graphite);line-height:1.1">Killer App</div>
      <div style="font-family:var(--font-editorial);font-style:italic;font-size:12px;color:var(--ink-faded);margin-top:2px">what gets done today</div>
    </div>
  </div>
  <div style="background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);overflow:hidden;box-shadow:var(--shadow-page-2)">
    <div style="height:50px;background:linear-gradient(135deg,#B08D5C 0%,#B08D5C 55%,#C68A3D 55%,#C68A3D 100%);border-bottom:1px solid var(--paper-edge);position:relative">
      <img src="../assets/plates/chrome-dream-machine.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply;opacity:0.55">
    </div>
    <div style="padding:10px 12px 12px">
      <div style="font-family:var(--font-display);font-size:14px;letter-spacing:-0.01em;color:var(--ink-graphite);line-height:1.1">Dream Machine</div>
      <div style="font-family:var(--font-editorial);font-style:italic;font-size:12px;color:var(--ink-faded);margin-top:2px">what gets imagined</div>
    </div>
  </div>
  <div style="background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);overflow:hidden;box-shadow:var(--shadow-page-2)">
    <div style="height:50px;background:linear-gradient(135deg,#5E7A56 0%,#5E7A56 55%,#3E5638 55%,#3E5638 100%);border-bottom:1px solid var(--paper-edge);position:relative">
      <img src="../assets/plates/chrome-knowledge-garden.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply;opacity:0.55">
    </div>
    <div style="padding:10px 12px 12px">
      <div style="font-family:var(--font-display);font-size:14px;letter-spacing:-0.01em;color:var(--ink-graphite);line-height:1.1">Knowledge Garden</div>
      <div style="font-family:var(--font-editorial);font-style:italic;font-size:12px;color:var(--ink-faded);margin-top:2px">what gets remembered</div>
    </div>
  </div>
  <div style="background:var(--bg-raised);border:1px solid var(--paper-edge);border-radius:var(--radius-xs);overflow:hidden;box-shadow:var(--shadow-page-2)">
    <div style="height:50px;background:linear-gradient(135deg,#5A3B1F 0%,#5A3B1F 55%,#C9B98A 55%,#C9B98A 100%);border-bottom:1px solid var(--paper-edge);position:relative">
      <img src="../assets/plates/builders-hammer.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply;opacity:0.55">
    </div>
    <div style="padding:10px 12px 12px">
      <div style="font-family:var(--font-display);font-size:14px;letter-spacing:-0.01em;color:var(--ink-graphite);line-height:1.1">Umbrella</div>
      <div style="font-family:var(--font-editorial);font-style:italic;font-size:12px;color:var(--ink-faded);margin-top:2px">cross-surface chrome</div>
    </div>
  </div>
</div>
</body></html>
