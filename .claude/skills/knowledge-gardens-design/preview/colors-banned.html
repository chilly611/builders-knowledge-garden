<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Banned colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:10px">EXPLICITLY DO NOT USE</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    
    <div>
      <div style="height:70px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:#FFFFFF;position:relative">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#444;font-family:var(--font-display);font-size:36px;line-height:1">×</div>
      </div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Pure white</div>
      <div class="eng" style="margin-top:2px">USE --PAPER-CREAM</div>
    </div>
    <div>
      <div style="height:70px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:#000000;position:relative">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-size:36px;line-height:1">×</div>
      </div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Pure black</div>
      <div class="eng" style="margin-top:2px">USE --INK-GRAPHITE</div>
    </div>
    <div>
      <div style="height:70px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:#1976D2;position:relative">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-size:36px;line-height:1">×</div>
      </div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Material blue</div>
      <div class="eng" style="margin-top:2px">FLAT SATURATED PRIMARY</div>
    </div>
    <div>
      <div style="height:70px;border-radius:var(--radius-xs);border:1px solid var(--paper-edge);background:linear-gradient(135deg,#7F00FF,#FF1493);position:relative">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-size:36px;line-height:1">×</div>
      </div>
      <div style="margin-top:6px;font-family:var(--font-display);font-size:13px;color:var(--ink-graphite)">Tropey gradient</div>
      <div class="eng" style="margin-top:2px">NO PURPLE → PINK</div>
    </div>
  </div>
</body></html>
