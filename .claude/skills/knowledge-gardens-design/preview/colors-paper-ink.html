<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Paper & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="./_base.css">
</head>
<body>
  <div class="eng" style="margin-bottom:8px">PAPER &amp; INK · NEUTRAL FOUNDATION · NO PURE WHITE · NO PURE BLACK</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
    
    <div class="swatch" style="background:#F2E9D2;height:78px">
      <div class="swatch-meta">
        <span>paper-cream</span><span class="hex">#F2E9D2</span>
      </div>
    </div>
    <div class="swatch" style="background:#E8DDB8;height:78px">
      <div class="swatch-meta">
        <span>paper-vellum</span><span class="hex">#E8DDB8</span>
      </div>
    </div>
    <div class="swatch" style="background:#D8C9A0;height:78px">
      <div class="swatch-meta">
        <span>paper-fold</span><span class="hex">#D8C9A0</span>
      </div>
    </div>
    <div class="swatch" style="background:#C9B98A;height:78px">
      <div class="swatch-meta">
        <span>paper-edge</span><span class="hex">#C9B98A</span>
      </div>
    </div>
    <div class="swatch" style="background:#B5A270;height:78px">
      <div class="swatch-meta">
        <span>paper-shadow</span><span class="hex">#B5A270</span>
      </div>
    </div>
    <div class="swatch" style="background:#8C6A45;height:78px">
      <div class="swatch-meta">
        <span>ink-faded</span><span class="hex">#8C6A45</span>
      </div>
    </div>
    <div class="swatch" style="background:#6B4A2A;height:78px">
      <div class="swatch-meta">
        <span>ink-script</span><span class="hex">#6B4A2A</span>
      </div>
    </div>
    <div class="swatch" style="background:#5A3B1F;height:78px">
      <div class="swatch-meta">
        <span>ink-sepia</span><span class="hex">#5A3B1F</span>
      </div>
    </div>
    <div class="swatch" style="background:#2A2620;height:78px">
      <div class="swatch-meta">
        <span>ink-graphite</span><span class="hex">#2A2620</span>
      </div>
    </div>
    <div class="swatch" style="background:#0A0A0A;height:78px">
      <div class="swatch-meta">
        <span>obsidian (dark only)</span><span class="hex">#0A0A0A</span>
      </div>
    </div>
  </div>
</body></html>
